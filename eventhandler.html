<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event handler</title>
</head>
<body>
   <h1>Event Handler</h1>
   <button id="btn1">Click Me</button>
   <input type="text" id="in" placeholder="type something">
   <p id="output"></p>
   <p id="res"></p>

   <div id="div" style="background-color: aqua;">Mouse Hover</div>
     
   <button onclick="window.print()">Print the page </button>
   <script>
      let btn1 = document.getElementById("btn1");
      let input = document.querySelector("#in");

      let i=0;
      input.oninput=function(){
        console.log(`oninput called ${i++}`);
        document.getElementById("output").innerHTML="U have typed something:"+input.value;
      }
      document.getElementById("res").innerText="hello";
      document.getElementById("res").innerHTML="<h1>hello</h1>";

      input.onkeyup=function(){
        alert("Key Released" + input.value)

      }

      input.onkeydown=function(){
        alert("Key Pressed" + input.value)
        
      }

      let div= document.getElementById("div");
      div.onmouseover=function(){
        alert("Mouse Hovered");
      }

      //window.onload=function(){
    // alert("Page Loaded");
      //}
      



        btn1.onclick = function() {
             alert("Button Clicked");
        }


   </script> 
</body>
</html>
