<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event handler</title>
</head>
<body>
   <h1>Event Handler</h1>
   <button id="btn1">Click Me</button>
   <input type="text" id="in" placeholder="type something">
   <p id="output"></p>
   <p id="res"></p>
   <script>
      let btn1 = document.getElementById("btn1");
      let input = document.querySelector("#in");

      let i=0;
      input.oninput=function(){
        console.log(`oninput called ${i++}`);
        document.getElementById("output").innerHTML="U have typed something:"+input.value;
      }
      document.getElementById("res").innerText="hello";
      document.getElementById("res").innerHTML="<h1>hello</h1>";


        btn1.onclick = function() {
             alert("Button Clicked");
        }


   </script> 
</body>
</html>
